name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - name: Lint
        run: uv run ruff check rag_system/ tests/
      - name: Type check
        run: uv run mypy --strict rag_system/

  test:
    runs-on: ubuntu-latest
    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - "6333:6333"
      postgres:
        image: postgres:16-alpine
        ports:
          - "5432:5432"
        env:
          POSTGRES_DB: rag_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - name: Run unit tests
        run: uv run pytest tests/unit/
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_LLM_MODEL: openai/gpt-4o-mini
          OPENROUTER_EMBEDDING_MODEL: openai/text-embedding-3-small
          QDRANT_HOST: localhost
          QDRANT_PORT: 6333
          QDRANT_COLLECTION: rag_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: rag_test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t rag-hex .
      - name: Build frontend image
        run: docker build -t rag-hex-frontend frontend/
